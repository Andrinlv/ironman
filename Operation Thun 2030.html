document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ine lake */\n    --water-2:#0ea5b7;\n    --leaf:#7cf8b1;\n    --rest:#8b6cf6;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased}\n  body{overflow-x:hidden}\n  a{color:inherit;text-decoration:none}\n  .mono{font-family:'JetBrains Mono',monospace;letter-spacing:.02em}\n  .anton{font-family:'Anton',sans-serif;letter-spacing:.01em;text-transform:uppercase}\n  .container{max-width:1440px;margin:0 auto;padding:0 48px}\n  /* ============ NAV ============ */\n  .topnav{position:fixed;top:0;left:0;right:0;z-index:50;backdrop-filter:blur(20px);background:rgba(10,13,18,.78);border-bottom:1px solid var(--line)}\n  .topnav .container{display:flex;align-items:center;justify-content:space-between;height:64px}\n  .brand{display:flex;align-items:center;gap:12px;font-family:'Anton';font-size:20px;letter-spacing:.05em}\n  .brand .dot{width:10px;height:10px;background:var(--accent);border-radius:2px;box-shadow:0 0 16px var(--accent)}\n  .nav-links{display:flex;gap:6px;font-size:13px}\n  .nav-links a{padding:8px 14px;border-radius:6px;color:var(--ink-2);transition:.18s}\n  .nav-links a:hover{background:var(--panel);color:var(--ink)}\n  .nav-cta{font-family:'JetBrains Mono';font-size:12px;color:var(--ink-3)}\n  .nav-cta b{color:var(--accent)}\n\n  /* ============ HERO ============ */\n  .hero{position:relative;min-height:100vh;padding:140px 0 80px;overflow:hidden;border-bottom:1px solid var(--line)}\n  .hero::before{content:\"\";position:absolute;inset:0;background:\n    radial-gradient(60% 50% at 80% 10%, rgba(255,69,48,.18), transparent 70%),\n    radial-gradient(50% 40% at 10% 90%, rgba(34,211,238,.12), transparent 70%),\n    linear-gradient(180deg, transparent, var(--bg) 80%);\n    pointer-events:none}\n  .hero-grid{position:absolute;inset:0;background-image:\n    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),\n    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);\n    background-size:64px 64px;mask-image:radial-gradient(80% 60% at 50% 40%,#000,transparent)}\n  .hero .container{position:relative;z-index:1}\n  .kicker{display:inline-flex;align-items:center;gap:10px;padding:7px 14px;border:1px solid var(--line-2);border-radius:999px;font-family:'JetBrains Mono';font-size:11px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.16em}\n  .kicker .pulse{width:7px;height:7px;background:var(--accent);border-radius:50%;box-shadow:0 0 0 0 var(--accent);animation:pulse 2s infinite}\n  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,69,48,.6)}70%{box-shadow:0 0 0 14px rgba(255,69,48,0)}100%{box-shadow:0 0 0 0 rgba(255,69,48,0)}}\n  h1.title{font-family:'Anton';font-size:clamp(72px,12vw,196px);line-height:.86;margin:24px 0 0;letter-spacing:-.01em}\n  h1.title .ln2{display:block;color:transparent;-webkit-text-stroke:1.5px var(--ink);}\n  h1.title .ln3{display:block;color:var(--accent)}\n  .hero-meta{margin-top:36px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;border-top:1px solid var(--line);padding-top:28px;max-width:1100px}\n  .meta-cell .lbl{font-family:'JetBrains Mono';font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.16em}\n  .meta-cell .val{font-family:'Anton';font-size:36px;margin-top:6px}\n  .meta-cell .sub{color:var(--ink-2);font-size:13px;margin-top:2px}\n\n  .hero-bottom{margin-top:64px;display:grid;grid-template-columns:1.1fr .9fr;gap:32px;align-items:end}\n  .mission{font-size:18px;line-height:1.55;color:var(--ink-2);max-width:620px}\n  .mission b{color:var(--ink)}\n  .countdown{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}\n  .cd-cell{background:var(--panel);border:1px solid var(--line);padding:18px 14px;border-radius:8px;text-align:center}\n  .cd-cell .n{font-family:'Anton';font-size:44px;line-height:1;color:var(--ink)}\n  .cd-cell .l{font-family:'JetBrains Mono';font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.16em;margin-top:8px}\n\n  /* ============ SECTION ============ */\n  section.block{padding:120px 0;border-bottom:1px solid var(--line);position:relative}\n  .sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:32px;margin-bottom:48px;padding-bottom:24px;border-bottom:1px solid var(--line)}\n  .sec-head .num{font-family:'JetBrains Mono';font-size:13px;color:var(--accent)}\n  .sec-head h2{font-family:'Anton';font-size:clamp(48px,7vw,96px);margin:6px 0 0;line-height:.9}\n  .sec-head .right{font-family:'JetBrains Mono';font-size:12px;color:var(--ink-3);text-align:right;max-width:360px;line-height:1.6}\n\n  /* ============ ROADMAP ============ */\n  .roadmap{position:relative;padding-left:24px}\n  .roadmap::before{content:\"\";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:linear-gradient(180deg,var(--water),var(--accent))}\n  .phase{position:relative;display:grid;grid-template-columns:200px 1fr;gap:48px;padding:24px 0 56px;border-bottom:1px dashed var(--line)}\n  .phase:last-child{border-bottom:none}\n  .phase::before{content:\"\";position:absolute;left:-22px;top:30px;width:16px;height:16px;border-radius:50%;background:var(--bg);border:3px solid var(--accent);box-shadow:0 0 0 4px rgba(255,69,48,.12)}\n  .phase[data-phase=\"p1\"]::before{border-color:var(--water)}\n  .phase[data-phase=\"p2\"]::before{border-color:var(--water-2)}\n  .phase[data-phase=\"p3\"]::before{border-color:var(--accent-2)}\n  .phase[data-phase=\"p4\"]::before{border-color:var(--leaf)}\n  .phase[data-phase=\"p5\"]::before{border-color:var(--accent);background:var(--accent);box-shadow:0 0 0 6px rgba(255,69,48,.18)}\n  .ph-left .yr{font-family:'Anton';font-size:64px;line-height:1}\n  .ph-left .tag{font-family:'JetBrains Mono';font-size:11px;letter-spacing:.16em;color:var(--ink-3);margin-top:8px;text-transform:uppercase}\n  .ph-right h3{font-family:'Anton';font-size:38px;margin:0 0 8px;letter-spacing:.005em}\n  .ph-right .event{color:var(--accent);font-family:'JetBrains Mono';font-size:12px;text-transform:uppercase;letter-spacing:.12em}\n  .ph-right p{color:var(--ink-2);line-height:1.6;margin:14px 0 20px;max-width:760px;font-size:15px}\n  .pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}\n  .pillar{background:var(--panel);border:1px solid var(--line);padding:14px;border-radius:6px}\n  .pillar .h{font-family:'JetBrains Mono';font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.14em}\n  .pillar .v{font-family:'Anton';font-size:22px;margin-top:6px}\n  .pillar .s{color:var(--ink-2);font-size:12px;margin-top:4px}\n  .pacechip{display:inline-flex;gap:8px;align-items:center;background:rgba(34,211,238,.07);border:1px solid rgba(34,211,238,.22);color:#9eecf8;padding:5px 10px;border-radius:999px;font-family:'JetBrains Mono';font-size:11px;margin:4px 6px 0 0}\n  .pacechip.red{background:rgba(255,69,48,.08);border-color:rgba(255,69,48,.28);color:#ffb1a4}\n  .pacechip.amber{background:rgba(255,209,102,.08);border-color:rgba(255,209,102,.3);color:#ffe4a1}\n  .pacechip.leaf{background:rgba(124,248,177,.07);border-color:rgba(124,248,177,.25);color:#bff5d2}\n\n  /* ============ WEEKLY GRID ============ */\n  .weekgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}\n  .day{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;min-height:340px;display:flex;flex-direction:column;transition:.2s}\n  .day:hover{border-color:var(--line-2);transform:translateY(-2px)}\n  .day .dh{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:14px}\n  .day .dh .dn{font-family:'Anton';font-size:22px}\n  .day .dh .di{font-family:'JetBrains Mono';font-size:11px;color:var(--ink-3)}\n  .slot{margin-bottom:14px;font-size:13px}\n  .slot .t{font-family:'JetBrains Mono';font-size:10px;color:var(--ink-3);letter-spacing:.1em;text-transform:uppercase}\n  .slot .h{font-family:'Anton';font-size:18px;margin:4px 0 4px;letter-spacing:.01em}\n  .slot .d{color:var(--ink-2);font-size:12px;line-height:1.5}\n  .badge{display:inline-block;padding:3px 8px;border-radius:4px;font-family:'JetBrains Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase}\n  .b-push{background:rgba(255,69,48,.12);color:#ffb1a4}\n  .b-pull{background:rgba(34,211,238,.12);color:#9eecf8}\n  .b-leg{background:rgba(255,209,102,.12);color:#ffe4a1}\n  .b-run{background:rgba(124,248,177,.12);color:#bff5d2}\n  .b-swim{background:rgba(34,211,238,.18);color:#a4eef9}\n  .b-bike{background:rgba(255,209,102,.18);color:#ffe6a4}\n  .b-rest{background:rgba(139,108,246,.16);color:#c8b8fb}\n  .b-tri{background:rgba(255,69,48,.16);color:#ffc1b6}\n  .day.rest{background:linear-gradient(180deg,#1a1730,var(--panel));border-color:#322a55}\n\n  /* ============ TABS for phase switcher ============ */\n  .tabs{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap}\n  .tab{background:var(--panel);border:1px solid var(--line);color:var(--ink-2);padding:10px 16px;border-radius:6px;font-family:'JetBrains Mono';font-size:12px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:.15s}\n  .tab:hover{color:var(--ink)}\n  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}\n\n  /* ============ GYM SPLIT ============ */\n  .splitwrap{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:32px}\n  .splitcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:24px;position:relative;overflow:hidden}\n  .splitcard::before{content:\"\";position:absolute;top:0;left:0;right:0;height:3px}\n  .splitcard.push::before{background:var(--accent)}\n  .splitcard.pull::before{background:var(--water)}\n  .splitcard.leg::before{background:var(--accent-2)}\n  .splitcard h4{font-family:'Anton';font-size:28px;margin:0 0 4px}\n  .splitcard .focus{font-family:'JetBrains Mono';font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.16em}\n  .ex{display:grid;grid-template-columns:1fr auto auto;gap:8px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;align-items:center}\n  .ex:last-child{border-bottom:none}\n  .ex .name{color:var(--ink)}\n  .ex .sets{font-family:'JetBrains Mono';font-size:11px;color:var(--ink-2)}\n  .ex .rest{font-family:'JetBrains Mono';font-size:10px;color:var(--ink-3)}\n\n  /* ============ NUTRITION ============ */\n  .nutri-head{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}\n  .macro{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px}\n  .macro .m{font-family:'JetBrains Mono';font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.14em}\n  .macro .v{font-family:'Anton';font-size:34px;margin-top:6px}\n  .macro .b{margin-top:10px;height:6px;background:var(--line);border-radius:3px;overflow:hidden}\n  .macro .b > i{display:block;height:100%}\n  .nutritable{width:100%;border-collapse:collapse;border:1px solid var(--line);border-radius:10px;overflow:hidden}\n  .nutritable th,.nutritable td{border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:14px 14px;text-align:left;vertical-align:top;font-size:13px;color:var(--ink-2);line-height:1.5}\n  .nutritable th{background:var(--panel-2);color:var(--ink);font-family:'JetBrains Mono';font-size:11px;text-transform:uppercase;letter-spacing:.14em;font-weight:500}\n  .nutritable td b{color:var(--ink);font-weight:600}\n  .nutritable td:first-child{font-family:'Anton';font-size:20px;color:var(--ink);background:var(--panel-2)}\n  .nutritable tr:hover td:not(:first-child){background:rgba(255,255,255,.015)}\n\n  /* ============ BUDGET ============ */\n  .budget-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:32px}\n  .savings{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:28px}\n  .savings h4{font-family:'Anton';font-size:24px;margin:0 0 18px}\n  .yr-row{display:grid;grid-template-columns:120px 1fr 120px;gap:16px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}\n  .yr-row:last-of-type{border-bottom:none}\n  .yr-row .l{font-family:'JetBrains Mono';font-size:13px;color:var(--ink)}\n  .yr-row .bar{height:10px;background:var(--line);border-radius:5px;overflow:hidden;position:relative}\n  .yr-row .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--water),var(--accent));border-radius:5px;transition:width 1.2s ease}\n  .yr-row .v{font-family:'Anton';font-size:20px;text-align:right}\n  .totals{margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:8px;border-top:1px solid var(--line);padding-top:20px}\n  .totals .t{font-family:'JetBrains Mono';font-size:11px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.14em}\n  .totals .v{font-family:'Anton';font-size:30px}\n\n  .alloc{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:28px}\n  .alloc h4{font-family:'Anton';font-size:24px;margin:0 0 18px}\n  .alloc-row{display:grid;grid-template-columns:1fr 100px 110px;gap:14px;padding:14px 0;border-bottom:1px solid var(--line);font-size:13px;align-items:center}\n  .alloc-row .cat{color:var(--ink)}\n  .alloc-row .pct{font-family:'JetBrains Mono';color:var(--ink-2);text-align:right}\n  .alloc-row .amt{font-family:'Anton';font-size:18px;text-align:right}\n  .alloc-row .dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:8px;vertical-align:middle}\n\n  /* ============ EQUIPMENT ============ */\n  .equip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}\n  .eq{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:8px;transition:.15s}\n  .eq:hover{border-color:var(--accent);transform:translateY(-2px)}\n  .eq .img{aspect-ratio:1.2/1;background:\n    repeating-linear-gradient(45deg,#1c2330 0 8px,#222a3a 8px 16px);\n    border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--ink-3);font-family:'JetBrains Mono';font-size:10px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--line-2);position:relative;overflow:hidden}\n  .eq .img::after{content:attr(data-label);text-align:center;padding:8px;background:rgba(10,13,18,.7);border:1px dashed var(--line-2);border-radius:4px}\n  .eq .nm{font-family:'Anton';font-size:18px}\n  .eq .ds{color:var(--ink-2);font-size:12px;line-height:1.5;flex:1}\n  .eq .ft{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:10px;margin-top:6px}\n  .eq .pr{font-family:'JetBrains Mono';font-size:13px;color:var(--ink)}\n  .eq .yr{font-family:'JetBrains Mono';font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.12em}\n\n  /* ============ RECOVERY ============ */\n  .recovery{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:32px}\n  .rcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:24px}\n  .rcard .ic{width:38px;height:38px;border-radius:8px;background:linear-gradient(135deg,#322a55,var(--rest));display:flex;align-items:center;justify-content:center;font-family:'Anton';color:#fff;margin-bottom:14px}\n  .rcard h4{font-family:'Anton';font-size:22px;margin:0 0 8px}\n  .rcard p{color:var(--ink-2);font-size:13px;line-height:1.6;margin:0}\n\n  /* ============ FOOTER ============ */\n  footer{padding:60px 0;text-align:center;color:var(--ink-3);font-family:'JetBrains Mono';font-size:11px;letter-spacing:.12em}\n  footer .big{font-family:'Anton';font-size:64px;color:var(--ink);letter-spacing:.02em;margin-bottom:12px}\n  footer .acc{color:var(--accent)}\n\n  /* responsive-ish */\n  @media (max-width:1100px){\n    .weekgrid{grid-template-columns:repeat(2,1fr)}\n    .splitwrap,.recovery,.equip{grid-template-columns:repeat(2,1fr)}\n    .hero-meta{grid-template-columns:repeat(2,1fr)}\n    .hero-bottom{grid-template-columns:1fr}\n    .nutri-head{grid-template-columns:repeat(2,1fr)}\n    .budget-grid{grid-template-columns:1fr}\n    .phase{grid-template-columns:1fr;gap:16px}\n    .container{padding:0 24px}\n    .nav-links{display:none}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<nav class=\"topnav\">\n  <div class=\"container\">\n    <div class=\"brand\"><span class=\"dot\"><\u002Fspan> OPERATION&nbsp;THUN&nbsp;<span style=\"color:var(--accent)\">2030<\u002Fspan><\u002Fdiv>\n    <div class=\"nav-links\">\n      <a href=\"#mission\">Mission<\u002Fa>\n      <a href=\"#roadmap\">Roadmap<\u002Fa>\n      <a href=\"#training\">Training<\u002Fa>\n      <a href=\"#nutrition\">Ernährung<\u002Fa>\n      <a href=\"#budget\">Budget<\u002Fa>\n      <a href=\"#equipment\">Equipment<\u002Fa>\n      <a href=\"#recovery\">Recovery<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"nav-cta\">T-MINUS <b id=\"navdays\">—<\u002Fb> TAGE<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ============================= HERO ============================= -->\n<header class=\"hero\" id=\"mission\">\n  <div class=\"hero-grid\"><\u002Fdiv>\n  <div class=\"container\">\n    <span class=\"kicker\"><span class=\"pulse\"><\u002Fspan> RACE DAY · SO 07. JULI 2030 · THUN, CH<\u002Fspan>\n    <h1 class=\"title\">\n      <span>IRONMAN<\u002Fspan>\n      <span class=\"ln2\">SWITZERLAND<\u002Fspan>\n      <span class=\"ln3\">THUN&nbsp;2030<\u002Fspan>\n    <\u002Fh1>\n\n    <div class=\"hero-meta\">\n      <div class=\"meta-cell\"><div class=\"lbl\">Schwimmen<\u002Fdiv><div class=\"val\">3.8 KM<\u002Fdiv><div class=\"sub\">Thunersee · 18°C avg<\u002Fdiv><\u002Fdiv>\n      <div class=\"meta-cell\"><div class=\"lbl\">Rad<\u002Fdiv><div class=\"val\">180 KM<\u002Fdiv><div class=\"sub\">2 Loops · Gürbetal · Gantrisch<\u002Fdiv><\u002Fdiv>\n      <div class=\"meta-cell\"><div class=\"lbl\">Laufen<\u002Fdiv><div class=\"val\">42.2 KM<\u002Fdiv><div class=\"sub\">3 Loops · Aare · Altstadt<\u002Fdiv><\u002Fdiv>\n      <div class=\"meta-cell\"><div class=\"lbl\">Ziel-Finishzeit<\u002Fdiv><div class=\"val\">&lt; 13H<\u002Fdiv><div class=\"sub\">Sub-13 first-timer plan<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"hero-bottom\">\n      <p class=\"mission\">\n        <b>Vier Jahre. Vier Disziplinen. Ein Finish.<\u002Fb> Dieser Plan transformiert einen normal trainierten Athleten in einen IRONMAN-Finisher in Thun — über vier sorgfältig gestaffelte Etappen: erst <b style=\"color:var(--leaf)\">Laufen<\u002Fb> dominieren, dann <b style=\"color:var(--water)\">Schwimmen<\u002Fb> draufpacken, dann <b style=\"color:var(--accent-2)\">Radfahren<\u002Fb> integrieren, und schließlich <b style=\"color:var(--accent)\">alles synchron<\u002Fb> über 226 km abrufen.\n      <\u002Fp>\n      <div class=\"countdown\" id=\"cd\">\n        <div class=\"cd-cell\"><div class=\"n\" id=\"cd-y\">—<\u002Fdiv><div class=\"l\">Jahre<\u002Fdiv><\u002Fdiv>\n        <div class=\"cd-cell\"><div class=\"n\" id=\"cd-m\">—<\u002Fdiv><div class=\"l\">Monate<\u002Fdiv><\u002Fdiv>\n        <div class=\"cd-cell\"><div class=\"n\" id=\"cd-w\">—<\u002Fdiv><div class=\"l\">Wochen<\u002Fdiv><\u002Fdiv>\n        <div class=\"cd-cell\"><div class=\"n\" id=\"cd-d\">—<\u002Fdiv><div class=\"l\">Tage<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ============================= ROADMAP ============================= -->\n<section class=\"block\" id=\"roadmap\">\n  <div class=\"container\">\n    <div class=\"sec-head\">\n      <div>\n        <div class=\"num\">[ 01 ] PHASEN-ROADMAP<\u002Fdiv>\n        <h2>Vier Etappen.<br>Ein Ziel.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"right\">Jede Phase baut die nächste Disziplin auf, ohne das Bestehende zu verlieren. Pace-Beibehaltung ist das zentrale Prinzip — keine erkämpfte Geschwindigkeit wird wieder hergegeben.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"roadmap\">\n\n      <div class=\"phase\" data-phase=\"p1\">\n        <div class=\"ph-left\">\n          <div class=\"yr\">2026<\u002Fdiv>\n          <div class=\"tag\">Phase 01 · Run Foundation<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ph-right\">\n          <div class=\"event\">SwissCityMarathon Lucerne · So 25. Oktober 2026<\u002Fdiv>\n          <h3>Der Marathon-Block<\u002Fh3>\n          <p>12 Monate Aufbau eines bombensicheren Lauf-Fundaments. Fokus: aerobe Kapazität, Lauftechnik, Pace-Disziplin, korrekte Zone-2-Arbeit. Wir starten mit einer 5-km-Baseline und enden mit einem sub-4h Marathon entlang des Vierwaldstättersees. <b>Alles andere wartet — erst die Beine.<\u002Fb><\u002Fp>\n          <span class=\"pacechip leaf\">Ziel-Pace: 5:30/km · 3:52h Finish<\u002Fspan>\n          <span class=\"pacechip leaf\">Wochen-KM: 25 → 65<\u002Fspan>\n          <span class=\"pacechip leaf\">Long Run: 32 km @ 6:00/km<\u002Fspan>\n          <div class=\"pillars\">\n            <div class=\"pillar\"><div class=\"h\">Block 1 · Nov–Feb<\u002Fdiv><div class=\"v\">Base<\u002Fdiv><div class=\"s\">Zone 2, Drills, 4×Wo<\u002Fdiv><\u002Fdiv>\n            <div class=\"pillar\"><div class=\"h\">Block 2 · Mär–Mai<\u002Fdiv><div class=\"v\">Build<\u002Fdiv><div class=\"s\">Tempo, Schwellen, HM-Test<\u002Fdiv><\u002Fdiv>\n            <div class=\"pillar\"><div class=\"h\">Block 3 · Jun–Aug<\u002Fdiv><div class=\"v\">Peak<\u002Fdiv><div class=\"s\">MP-Runs, 30 km Longruns<\u002Fdiv><\u002Fdiv>\n            <div class=\"pillar\"><div class=\"h\">Block 4 · Sep–Okt<\u002Fdiv><div class=\"v\">Taper<\u002Fdiv><div class=\"s\">Race-Pace, 3 Wo Taper<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"phase\" data-phase=\"p2\">\n        <div class=\"ph-left\">\n          <div class=\"yr\">2027<\u002Fdiv>\n          <div class=\"tag\">Phase 02 · Add Swim<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ph-right\">\n          <div class=\"event\">ÖTILLÖ SwimRun Engadin World Series · Sa 03. Juli 2027 · Silvaplana<\u002Fdiv>\n          <h3>Schwimmen lernen — schnell.<\u002Fh3>\n          <p>Nach dem Marathon-Recovery (Nov–Dez 2026) startet das Wasser-Programm: 3×Wo Pool, Technik mit Coach, dann Open-Water in Walensee und Thunersee. Ziel: 4 km am Stück bei 1:55/100m, im 1800m-Höhen-Kaltwasser auf 10–14°C. Lauf-Pace wird auf MP+30s \"geparkt\" — nicht verloren.<\u002Fp>\n          <span class=\"pacechip\">Swim-Pace: 1:55/100m · 4km in 76min<\u002Fspan>\n          <span class=\"pacechip leaf\">Lauf-Maintenance: 50 km/Woche<\u002Fspan>\n          <span class=\"pacechip\">Höhentraining: 1800m Engadin<\u002Fspan>\n          <div class=\"pillars\">\n            <div class=\"pillar\"><div class=\"h\">Nov–Jan<\u002Fdiv><div class=\"v\">Recovery<\u002Fdiv><div class=\"s\">Swim-Tech 2×Wo, kein Marathon<\u002Fdiv><\u002Fdiv>\n            <div class=\"pillar\"><div class=\"h\">Feb–Apr<\u002Fdiv><div class=\"v\">Swim Base<\u002Fdiv><div class=\"s\">CSS-Sets, 2.5 km Threshold<\u002Fdiv><\u002Fdiv>\n            <div class=\"pillar\"><div class=\"h\">Mai–Jun<\u002Fdiv><div class=\"v\">Open Water<\u002Fdiv><div class=\"s\">Brick: Swim + 10k Run<\u002Fdiv><\u002Fdiv>\n            <div class=\"pillar\"><div class=\"h\">Jul<\u002Fdiv><div class=\"v\">Race · Engadin<\u002Fdiv><div class=\"s\">Sprint vor World Series<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"phase\" data-phase=\"p3\">\n        <div class=\"ph-left\">\n          <div class=\"yr\">2028<\u002Fdiv>\n          <div class=\"tag\">Phase 03 · Add Bike<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ph-right\">\n          <div class=\"event\">Solo Century Ride · 180 km Sub-8h · Juli 2028 · Berner Oberland<\u002Fdiv>\n          <h3>Auf das Rad — 180 km in unter 8h.<\u002Fh3>\n          <p>Mit dem Rennrad-Kauf im Januar 2028 beginnt der Bike-Block. Indoor-Trainer + Rouvy-Sessions auf der Original-Thun-Strecke. Ziel: 180 km in &lt; 8 h auf der echten IRONMAN-Route inkl. Gantrisch-Anstieg. Schwimm- und Lauf-Pace werden mit jeweils 2× pro Woche aufrechterhalten.<\u002Fp>\n          <span class=\"pacechip amber\">Bike-Pace: 25 km/h avg · 180km in 7:12h<\u002Fspan>\n          <span class=\"pacechip\">Swim-Maintenance: 2×Wo · 3km<\u002Fspan>\n          <span class=\"pacechip leaf\">Run-Maintenance: 3×Wo · 40km<\u002Fspan>\n          <div class=\"pillars\">\n            <div class=\"pillar\"><div class=\"h\">Aug–Dez 2027<\u002Fdiv><div class=\"v\">Spar-Block<\u002Fdiv><div class=\"s\">800 CHF/Mo für Rennrad<\u002Fdiv><\u002Fdiv>\n            <div class=\"pillar\"><div class=\"h\">Jan–Apr 2028<\u002Fdiv><div class=\"v\">FTP Build<\u002Fdiv><div class=\"s\">Indoor Trainer, FTP-Tests<\u002Fdiv><\u002Fdiv>\n            <div class=\"pillar\"><div class=\"h\">Mai–Jun<\u002Fdiv><div class=\"v\">Long Rides<\u002Fdiv><div class=\"s\">100/120/150 km outdoor<\u002Fdiv><\u002Fdiv>\n            <div class=\"pillar\"><div class=\"h\">Jul 2028<\u002Fdiv><div class=\"v\">Test-Ride<\u002Fdiv><div class=\"s\">180 km IRONMAN-Course<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"phase\" data-phase=\"p4\">\n        <div class=\"ph-left\">\n          <div class=\"yr\">2029<\u002Fdiv>\n          <div class=\"tag\">Phase 04 · Race Calendar<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ph-right\">\n          <div class=\"event\">6 Triathlons · Sprint → 70.3 · Aug 2028 – Sep 2029<\u002Fdiv>\n          <h3>Vom Athleten zum Triathleten.<\u002Fh3>\n          <p>Sechs Wettkämpfe in aufsteigender Distanz: drei kurze, ein olympischer, zwei Mitteldistanzen (70.3). Jeder ist ein Lerntest für Transition, Pacing, Race-Nutrition, Gear-Setup. Alle drei Disziplinen werden simultan trainiert mit periodisierter Belastung.<\u002Fp>\n          <div class=\"pillars\" style=\"grid-template-columns:repeat(3,1fr)\">\n            <div class=\"pillar\"><div class=\"h\">#1 · Aug 2028<\u002Fdiv><div class=\"v\">Sprint Zürich<\u002Fdiv><div class=\"s\">750m / 20km / 5km · Test-Race<\u002Fdiv><\u002Fdiv>\n            <div class=\"pillar\"><div class=\"h\">#2 · Sep 2028<\u002Fdiv><div class=\"v\">Sprint Locarno<\u002Fdiv><div class=\"s\">Speedwork-Fokus<\u002Fdiv><\u002Fdiv>\n            <div class=\"pillar\"><div class=\"h\">#3 · Mai 2029<\u002Fdiv><div class=\"v\">Olympic Nyon<\u002Fdiv><div class=\"s\">1.5/40/10 · 1. Mitteldistanz-Vorbereitung<\u002Fdiv><\u002Fdiv>\n            <div class=\"pillar\"><div class=\"h\">#4 · Jun 2029<\u002Fdiv><div class=\"v\">Olympic Zug<\u002Fdiv><div class=\"s\">Pacing-Refinement<\u002Fdiv><\u002Fdiv>\n            <div class=\"pillar\"><div class=\"h\">#5 · Jul 2029<\u002Fdiv><div class=\"v\">70.3 Rapperswil<\u002Fdiv><div class=\"s\">1.9/90/21 · halbe Distanz<\u002Fdiv><\u002Fdiv>\n            <div class=\"pillar\"><div class=\"h\">#6 · Sep 2029<\u002Fdiv><div class=\"v\">70.3 Thun<\u002Fdiv><div class=\"s\">Generalprobe auf Original-Course<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"phase\" data-phase=\"p5\">\n        <div class=\"ph-left\">\n          <div class=\"yr\">2030<\u002Fdiv>\n          <div class=\"tag\">Phase 05 · Race Day<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ph-right\">\n          <div class=\"event\">IRONMAN SWITZERLAND THUN · So 07. Juli 2030 · 06:30 Start<\u002Fdiv>\n          <h3>226 Kilometer. Ein Tag. Ein Finish.<\u002Fh3>\n          <p>Sechs Monate Peaking. Januar startet der 26-Wochen IRONMAN-Block: drei Sportarten täglich periodisiert, zwei Bricks/Woche, monatlicher 6h-Long-Day, dreiwöchiges Taper. Ziel-Splits unten — alles schwarz auf weiß, alles trainierbar.<\u002Fp>\n          <span class=\"pacechip\">Swim Split · 1:18h · 1:58/100m<\u002Fspan>\n          <span class=\"pacechip amber\">Bike Split · 7:00h · 25.7 km/h<\u002Fspan>\n          <span class=\"pacechip leaf\">Run Split · 4:30h · 6:24/km<\u002Fspan>\n          <span class=\"pacechip red\">Total · 12:55h · Sub-13 Finish<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================= TRAINING WEEK ============================= -->\n<section class=\"block\" id=\"training\">\n  <div class=\"container\">\n    <div class=\"sec-head\">\n      <div>\n        <div class=\"num\">[ 02 ] WOCHENPLAN<\u002Fdiv>\n        <h2>Sieben Tage.<br>Volle Periodisierung.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"right\">Wähle eine Phase — der Wochenplan passt sich an. Donnerstag ist <b style=\"color:var(--rest)\">FIXER REST DAY<\u002Fb>. Sonntag ist der zweite Rest- oder Active-Recovery-Tag. Gym wird in PUSH / PULL / LEG gesplittet, jeweils 60–75 min.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tabs\" id=\"phasetabs\">\n      <button class=\"tab active\" data-phase=\"run\">2026 · Marathon-Block<\u002Fbutton>\n      <button class=\"tab\" data-phase=\"swim\">2027 · SwimRun-Block<\u002Fbutton>\n      <button class=\"tab\" data-phase=\"bike\">2028 · Bike-Block<\u002Fbutton>\n      <button class=\"tab\" data-phase=\"tri\">2029 · Triathlon-Block<\u002Fbutton>\n      <button class=\"tab\" data-phase=\"iron\">2030 · IRONMAN Peak<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"weekgrid\" id=\"weekgrid\"><\u002Fdiv>\n\n    <!-- GYM SPLIT -->\n    <div style=\"margin-top:64px;padding-top:48px;border-top:1px solid var(--line)\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px\">\n        <h3 class=\"anton\" style=\"font-size:38px;margin:0\">Gym Split · 3× pro Woche<\u002Fh3>\n        <div class=\"mono\" style=\"font-size:12px;color:var(--ink-3)\">PUSH · PULL · LEG · jeweils 60–75 min<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"splitwrap\">\n\n        <div class=\"splitcard push\">\n          <div class=\"focus\">Tag A · Brust · Schulter · Trizeps<\u002Fdiv>\n          <h4>PUSH<\u002Fh4>\n          <div class=\"ex\"><div class=\"name\">Bench Press<\u002Fdiv><div class=\"sets\">4 × 6–8<\u002Fdiv><div class=\"rest\">2:30<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Incline DB Press<\u002Fdiv><div class=\"sets\">3 × 8–10<\u002Fdiv><div class=\"rest\">2:00<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Standing OHP<\u002Fdiv><div class=\"sets\">3 × 6–8<\u002Fdiv><div class=\"rest\">2:00<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Cable Lateral Raise<\u002Fdiv><div class=\"sets\">4 × 12–15<\u002Fdiv><div class=\"rest\">1:00<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Dips (Weighted)<\u002Fdiv><div class=\"sets\">3 × 8–10<\u002Fdiv><div class=\"rest\">2:00<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Triceps Pushdown<\u002Fdiv><div class=\"sets\">3 × 12<\u002Fdiv><div class=\"rest\">1:00<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Core: Pallof Press<\u002Fdiv><div class=\"sets\">3 × 12<\u002Fdiv><div class=\"rest\">0:45<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"splitcard pull\">\n          <div class=\"focus\">Tag B · Rücken · Bizeps · Rear Delts<\u002Fdiv>\n          <h4>PULL<\u002Fh4>\n          <div class=\"ex\"><div class=\"name\">Deadlift<\u002Fdiv><div class=\"sets\">4 × 4–6<\u002Fdiv><div class=\"rest\">3:00<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Pull-Ups (Weighted)<\u002Fdiv><div class=\"sets\">4 × 6–8<\u002Fdiv><div class=\"rest\">2:30<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Barbell Row<\u002Fdiv><div class=\"sets\">3 × 8–10<\u002Fdiv><div class=\"rest\">2:00<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Cable Row<\u002Fdiv><div class=\"sets\">3 × 10–12<\u002Fdiv><div class=\"rest\">1:30<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Face Pull<\u002Fdiv><div class=\"sets\">4 × 15<\u002Fdiv><div class=\"rest\">1:00<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">DB Curl<\u002Fdiv><div class=\"sets\">3 × 10<\u002Fdiv><div class=\"rest\">1:00<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Hammer Curl<\u002Fdiv><div class=\"sets\">3 × 10<\u002Fdiv><div class=\"rest\">1:00<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"splitcard leg\">\n          <div class=\"focus\">Tag C · Quads · Hams · Glutes · Calves<\u002Fdiv>\n          <h4>LEG<\u002Fh4>\n          <div class=\"ex\"><div class=\"name\">Back Squat<\u002Fdiv><div class=\"sets\">4 × 5–6<\u002Fdiv><div class=\"rest\">3:00<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Romanian Deadlift<\u002Fdiv><div class=\"sets\">3 × 8<\u002Fdiv><div class=\"rest\">2:30<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Bulgarian Split Squat<\u002Fdiv><div class=\"sets\">3 × 8/Bein<\u002Fdiv><div class=\"rest\">2:00<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Leg Press<\u002Fdiv><div class=\"sets\">3 × 10–12<\u002Fdiv><div class=\"rest\">2:00<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Hip Thrust<\u002Fdiv><div class=\"sets\">3 × 10<\u002Fdiv><div class=\"rest\">1:30<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Standing Calf Raise<\u002Fdiv><div class=\"sets\">4 × 12–15<\u002Fdiv><div class=\"rest\">1:00<\u002Fdiv><\u002Fdiv>\n          <div class=\"ex\"><div class=\"name\">Single-Leg Glute Bridge<\u002Fdiv><div class=\"sets\">3 × 12/Bein<\u002Fdiv><div class=\"rest\">0:45<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n      <div class=\"mono\" style=\"font-size:12px;color:var(--ink-3);margin-top:18px;line-height:1.7\">\n        <b style=\"color:var(--accent)\">PROGRESSION:<\u002Fb> Gewicht jede Woche um 2.5 kg (Oberkörper) bzw. 5 kg (Beine) steigern, solange Form sauber.\n        <b style=\"color:var(--water)\">DELOAD:<\u002Fb> alle 4 Wochen 60 % Volumen.\n        <b sty \n        <div class=\"img\" data-label=\"RUN SHOES x4\"><\u002Fdiv>\n        <div class=\"nm\">Laufschuhe · 4 Paar Rotation<\u002Fdiv>\n        <div class=\"ds\">Daily Trainer + Tempo + Long Run + Race-Carbon-Plate. ~ 600 km pro Paar.<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 1 100<\u002Fspan><span class=\"yr\">2026<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eq\">\n        <div class=\"img\" data-label=\"RUN APPAREL\"><\u002Fdiv>\n        <div class=\"nm\">Lauf-Bekleidung &amp; Zubehör<\u002Fdiv>\n        <div class=\"ds\">Tights, Singlets, Caps, Socken, Trinkgurt, Stirnlampe (Winter-Runs).<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 500<\u002Fspan><span class=\"yr\">2026<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eq\">\n        <div class=\"img\" data-label=\"HRM CHEST\"><\u002Fdiv>\n        <div class=\"nm\">HF-Brustgurt · Polar H10<\u002Fdiv>\n        <div class=\"ds\">Genauer als Optisch — Pflicht für Schwellen- und Zone-2-Tests.<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 100<\u002Fspan><span class=\"yr\">2026<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eq\">\n        <div class=\"img\" data-label=\"WETSUIT\"><\u002Fdiv>\n        <div class=\"nm\">Triathlon-Neoprenanzug<\u002Fdiv>\n        <div class=\"ds\">Vollanzug 4/3 mm für Kaltwasser Engadin &amp; Thunersee. Eigentum statt Miete.<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 500<\u002Fspan><span class=\"yr\">Q1 · 2027<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eq\">\n        <div class=\"img\" data-label=\"SWIM KIT\"><\u002Fdiv>\n        <div class=\"nm\">Swim-Kit · Brille, Cap, Paddles, Pull Buoy<\u002Fdiv>\n        <div class=\"ds\">Schwimmbrille klar + getönt, Neoprenkappe, Trainingstools.<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 250<\u002Fspan><span class=\"yr\">2027<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eq\">\n        <div class=\"img\" data-label=\"SWIMRUN KIT\"><\u002Fdiv>\n        <div class=\"nm\">SwimRun-Spezialausrüstung<\u002Fdiv>\n        <div class=\"ds\">SwimRun-Anzug, Pull-Cord, Schwimm-Paddles, Schuhe mit Drainage (Engadin).<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 800<\u002Fspan><span class=\"yr\">Q2 · 2027<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eq\">\n        <div class=\"img\" data-label=\"ROAD BIKE\"><\u002Fdiv>\n        <div class=\"nm\">Rennrad · Canyon Endurace CF 7<\u002Fdiv>\n        <div class=\"ds\">Carbon-Rahmen, Shimano 105 Di2, Discs. Solide Endurance-Geometrie für IM.<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 3 500<\u002Fspan><span class=\"yr\">Q1 · 2028<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eq\">\n        <div class=\"img\" data-label=\"POWER METER\"><\u002Fdiv>\n        <div class=\"nm\">Powermeter + Bike-Computer<\u002Fdiv>\n        <div class=\"ds\">Kurbelbasiert Power-Meter, Garmin Edge 540. Trainings-Steuerung über Watt.<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 1 100<\u002Fspan><span class=\"yr\">2028<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eq\">\n        <div class=\"img\" data-label=\"INDOOR TRAINER\"><\u002Fdiv>\n        <div class=\"nm\">Smart Trainer · Wahoo Kickr Core<\u002Fdiv>\n        <div class=\"ds\">Indoor-Training Winter + Rouvy-Sims der echten IRONMAN-Strecke.<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 850<\u002Fspan><span class=\"yr\">Q1 · 2028<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eq\">\n        <div class=\"img\" data-label=\"HELMET + TT\"><\u002Fdiv>\n        <div class=\"nm\">Aero-Helm + TT-Aufsatz<\u002Fdiv>\n        <div class=\"ds\">Aerodynamik = Watt-Ersparnis. Aufsatz statt komplettem TT-Rad.<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 700<\u002Fspan><span class=\"yr\">2028<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eq\">\n        <div class=\"img\" data-label=\"BIKE APPAREL\"><\u002Fdiv>\n        <div class=\"nm\">Bike-Bekleidung &amp; Schuhe<\u002Fdiv>\n        <div class=\"ds\">2× Trikot/Bib, Schuhe, Handschuhe, Brille, Regenjacke, Werkzeug.<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 900<\u002Fspan><span class=\"yr\">2028<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eq\">\n        <div class=\"img\" data-label=\"TRI SUIT\"><\u002Fdiv>\n        <div class=\"nm\">Tri-Anzug + Race-Apparel<\u002Fdiv>\n        <div class=\"ds\">Einteiler für Wettkampf — Schwimmen, Radeln, Laufen ohne Wechsel.<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 350<\u002Fspan><span class=\"yr\">Q2 · 2028<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eq\">\n        <div class=\"img\" data-label=\"RACE WHEELS\"><\u002Fdiv>\n        <div class=\"nm\">Race-Laufradsatz (Carbon)<\u002Fdiv>\n        <div class=\"ds\">Tieferes Profil für Race Day. Trainings-Laufräder bleiben für Alltag.<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 1 800<\u002Fspan><span class=\"yr\">Q1 · 2029<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eq\">\n        <div class=\"img\" data-label=\"RECOVERY\"><\u002Fdiv>\n        <div class=\"nm\">Recovery-Tools<\u002Fdiv>\n        <div class=\"ds\">Massage-Gun, Foam Roller, Kompressionssocken, Sauna-Pass.<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 400<\u002Fspan><span class=\"yr\">2027<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"eq\">\n        <div class=\"img\" data-label=\"RESERVE\"><\u002Fdiv>\n        <div class=\"nm\">Reserve · Verschleiß &amp; Upgrades<\u002Fdiv>\n        <div class=\"ds\">Reifen, Ketten, neue Schuhe Jahr 4, Service, Crash-Reserve.<\u002Fdiv>\n        <div class=\"ft\"><span class=\"pr\">CHF 2 500<\u002Fspan><span class=\"yr\">2029–30<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div class=\"mono\" style=\"font-size:12px;color:var(--ink-3);margin-top:24px;line-height:1.8;text-align:right\">\n      <b style=\"color:var(--ink-2)\">SUMME EQUIPMENT:<\u002Fb> <span style=\"color:var(--accent);font-size:14px\">CHF 16 000<\u002Fspan> · exakt zum Budget.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================= RECOVERY ============================= -->\n<section class=\"block\" id=\"recovery\">\n  <div class=\"container\">\n    <div class=\"sec-head\">\n      <div>\n        <div class=\"num\">[ 06 ] RECOVERY<\u002Fdiv>\n        <h2>Donnerstag ist<br>heilig.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"right\">Zwei Rest Days pro Woche sind nicht verhandelbar. Donnerstag = totaler Off-Day, Sonntag = Active Recovery oder Off. Recovery ist Training in Tarnkleidung.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"recovery\">\n      <div class=\"rcard\">\n        <div class=\"ic\">Do<\u002Fdiv>\n        <h4>Donnerstag · Total Off<\u002Fh4>\n        <p>Keine Workouts. Nicht ins Gym, nicht laufen. Erlaubt: Spazieren, Yoga 20 min, Mobility, Reha-Übungen. Schlaf-Ziel: 9 h. Mahlzeiten leicht reduziert (Rest-Day-Carbs).<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rcard\">\n        <div class=\"ic\">So<\u002Fdiv>\n        <h4>Sonntag · Active / Off<\u002Fh4>\n        <p>Wahlweise leichter Spin auf dem Trainer (45 min Z1), Yoga oder Vinyasa, Schwimm-Mobility. In hartem Block: voller Rest. Letzter harter Trainingstag ist Samstag.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rcard\">\n        <div class=\"ic\">Zz<\u002Fdiv>\n        <h4>Schlaf · 8h+ Pflicht<\u002Fh4>\n        <p>Trainings-Recovery passiert im Schlaf. Bedtime 22:30, Aufstehen 06:30. Vor Long Days: 9 h. Bildschirm aus 60 min vor Bett, Magnesium, kühles Zimmer (18°C).<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rcard\">\n        <div class=\"ic\">Δ<\u002Fdiv>\n        <h4>Deload alle 4 Wochen<\u002Fh4>\n        <p>Jede 4. Woche: Volumen −40 %, Intensität bleibt. Ohne Deloads kommt der Burnout vor dem Marathon. Nicht überspringen, auch wenn es sich gut anfühlt.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rcard\">\n        <div class=\"ic\">⌖<\u002Fdiv>\n        <h4>Mobility · 15 min/d<\u002Fh4>\n        <p>Hip Flexor, Pec, Thoracic Spine, Ankle Dorsiflexion, Hamstring. Direkt nach dem Aufwachen oder vor Bett. Verhindert die typischen IM-Verletzungen (ITBS, Plantar Fascia).<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rcard\">\n        <div class=\"ic\">Σ<\u002Fdiv>\n        <h4>Monitoring · HRV &amp; RHR<\u002Fh4>\n        <p>Tägliche HRV via Garmin. RHR-Anstieg &gt; 7 bpm = automatischer Easy Day. Body Battery &lt; 30 = Workout cancelled. Daten regieren, nicht Ego.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mono\" style=\"font-size:12px;color:var(--ink-3);margin-top:32px;line-height:1.8\">\n      <b style=\"color:var(--accent)\">DIE 4 GOLDENEN REGELN:<\u002Fb>\n      &nbsp;[1] Niemals 2 harte Tage in Folge.\n      &nbsp;[2] Schmerz ≠ Müdigkeit · Schmerz = stop.\n      &nbsp;[3] Donnerstag wird NICHT verschoben.\n      &nbsp;[4] Wenn die HRV 3 Tage tankt — Deload sofort.\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================= FOOTER ============================= -->\n<footer>\n  <div class=\"container\">\n    <div class=\"big\">SEE&nbsp;YOU&nbsp;IN&nbsp;<span class=\"acc\">THUN<\u002Fspan><\u002Fdiv>\n    <div>07.07.2030 · 06:30 START · LIDO THUN · ZIEL: ALTSTADT · 12:55h GEPLANT<\u002Fdiv>\n    <div style=\"margin-top:14px;color:var(--ink-3)\">— EINE TAGESREISE. VIER JAHRE VORBEREITUNG. —<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  /* ============== COUNTDOWN ============== */\n  const RACE = new Date('2030-07-07T06:30:00+02:00');\n  function tick(){\n    const now = new Date();\n    let diff = Math.max(0, RACE - now);\n    const day = 86400000;\n    const days = Math.floor(diff / day);\n    const years = Math.floor(days/365.25);\n    const months = Math.floor((days - years*365.25)/30.44);\n    const weeks = Math.floor((days - years*365.25 - months*30.44)/7);\n    const restDays = Math.floor(days - years*365.25 - months*30.44 - weeks*7);\n    document.getElementById('cd-y').textContent = String(years).padStart(2,'0');\n    document.getElementById('cd-m').textContent = String(months).padStart(2,'0');\n    document.getElementById('cd-w').textContent = String(weeks).padStart(2,'0');\n    document.getElementById('cd-d').textContent = String(restDays).padStart(2,'0');\n    document.getElementById('navdays').textContent = days.toLocaleString('de-CH');\n  }\n  tick(); setInterval(tick, 60000);\n\n  /* ============== WEEK PLANS ============== */\n  const PLANS = {\n    run: {\n      name:'MARATHON-BLOCK · 2026',\n      mon: [{t:'06:30 · 60 min',badge:'b-run',h:'Easy Run · Zone 2',d:'8 km @ 6:00/km — Aerob'},{t:'18:00 · 75 min',badge:'b-push',h:'PUSH (Gym)',d:'Brust · Schulter · Trizeps'}],\n      tue: [{t:'06:30 · 75 min',badge:'b-run',h:'Intervalle',d:'6× 1000m @ 4:30/km, 90s Trab-Pause'}],\n      wed: [{t:'06:30 · 50 min',badge:'b-run',h:'Recovery Run',d:'6 km @ 6:30/km · Plauder-Pace'},{t:'18:00 · 75 min',badge:'b-pull',h:'PULL (Gym)',d:'Rücken · Bizeps · Rear Delts'}],\n      thu: [{t:'—',badge:'b-rest',h:'★ TOTAL REST',d:'Spazieren, Mobility, Schlaf 9h'}],\n      fri: [{t:'18:00 · 75 min',badge:'b-leg',h:'LEG (Gym)',d:'Squat · RDL · Hip Thrust · Calves'}],\n      sat: [{t:'08:00 · 2.5h',badge:'b-run',h:'LONG RUN',d:'24–32 km · letzte 5 km @ MP (5:30/km)'}],\n      sun: [{t:'10:00 · 60 min',badge:'b-rest',h:'Active Recovery',d:'Yoga oder leichter Spin Z1'}],\n    },\n    swim: {\n      name:'SWIMRUN-BLOCK · 2027',\n      mon: [{t:'06:30 · 60 min',badge:'b-swim',h:'Pool · Tech & CSS',d:'1×400 WU, 8×100 @ CSS, 200 CD'},{t:'18:00 · 75 min',badge:'b-push',h:'PUSH (Gym)',d:'Push-Movements, Lat-Fokus'}],\n      tue: [{t:'06:30 · 70 min',badge:'b-run',h:'Tempo Run',d:'4× 1.5k @ 4:45/km, 2 min Pause'}],\n      wed: [{t:'06:30 · 60 min',badge:'b-swim',h:'Pool · Endurance',d:'3000m steady · 2:00/100m Pace'},{t:'18:00 · 75 min',badge:'b-pull',h:'PULL (Gym)',d:'Rücken-Schwerpunkt für Schwimm-Zug'}],\n      thu: [{t:'—',badge:'b-rest',h:'★ TOTAL REST',d:'Spazieren, Mobility, Schlaf 9h'}],\n      fri: [{t:'06:30 · 50 min',badge:'b-run',h:'Easy Run',d:'8 km Zone 2 — Pace erhalten'},{t:'18:00 · 75 min',badge:'b-leg',h:'LEG (Gym)',d:'Glutes & Calves für Trail'}],\n      sat: [{t:'07:00 · 3h',badge:'b-tri',h:'BRICK · Swim + Run',d:'2km Open Water + 15 km Trail Run · SwimRun-Sim'}],\n      sun: [{t:'10:00 · 75 min',badge:'b-run',h:'Long Run · Lock-in',d:'18 km Z2 · Pace 5:45/km'}],\n    },\n    bike: {\n      name:'BIKE-BLOCK · 2028',\n      mon: [{t:'06:30 · 60 min',badge:'b-bike',h:'Trainer · Threshold',d:'3× 10 min @ FTP, 5 min Recovery'},{t:'18:00 · 75 min',badge:'b-push',h:'PUSH (Gym)',d:'Reduced Volume — Recovery-Mode'}],\n      tue: [{t:'06:30 · 60 min',badge:'b-swim',h:'Pool · Tech',d:'2500m · 50/50 Tech/Endurance'},{t:'18:00 · 60 min',badge:'b-run',h:'Easy Run',d:'10 km @ 5:45/km'}],\n      wed: [{t:'06:30 · 75 min',badge:'b-bike',h:'Trainer · Sweet Spot',d:'2× 20 min @ 88% FTP, 10 min recovery'},{t:'18:00 · 75 min',badge:'b-pull',h:'PULL (Gym)',d:'Volle Routine'}],\n      thu: [{t:'—',badge:'b-rest',h:'★ TOTAL REST',d:'Komplett off — Schlaf 9h'}],\n      fri: [{t:'06:30 · 60 min',badge:'b-swim',h:'Pool · CSS-Set',d:'10×100 @ CSS, RI 15s'},{t:'18:00 · 60 min',badge:'b-leg',h:'LEG (Gym)',d:'Light Squat, Single-Leg Fokus'}],\n      sat: [{t:'07:00 · 5h',badge:'b-bike',h:'LONG RIDE',d:'120–150 km · 25 km/h avg · Verpflegung-Test'}],\n      sun: [{t:'08:00 · 90 min',badge:'b-tri',h:'BRICK · Bike + Run',d:'2h Z2 Bike → 5 km Run @ MP'}],\n    },\n    tri: {\n      name:'TRIATHLON-BLOCK · 2029',\n      mon: [{t:'06:30 · 60 min',badge:'b-swim',h:'Pool · CSS',d:'3000m mit 6×200 @ Race-Pace'},{t:'18:00 · 60 min',badge:'b-push',h:'PUSH (Gym · Maint.)',d:'2× Wo Erhaltungstraining'}],\n      tue: [{t:'06:30 · 90 min',badge:'b-bike',h:'Trainer · VO2',d:'5× 4 min @ 110% FTP, 4 min RI'}],\n      wed: [{t:'06:30 · 75 min',badge:'b-run',h:'Threshold Run',d:'3× 2k @ 4:30/km, 3 min Pause'},{t:'18:00 · 60 min',badge:'b-pull',h:'PULL (Gym · Maint.)',d:'Volume reduced, Frequenz hoch'}],\n      thu: [{t:'—',badge:'b-rest',h:'★ TOTAL REST',d:'Hot-Stone, Mobility, Schlaf'}],\n      fri: [{t:'06:30 · 60 min',badge:'b-swim',h:'Pool · Open Water Drills',d:'Sighting, Drafting, Race-Starts'}],\n      sat: [{t:'06:30 · 4h',badge:'b-tri',h:'BIG BRICK',d:'90 km Bike + 21 km Run · Race-Sim'}],\n      sun: [{t:'08:00 · 2.5h',badge:'b-bike',h:'Long Endurance Ride',d:'80 km Z2 · Verpflegungs-Routine'}],\n    },\n    iron: {\n      name:'IRONMAN PEAK · 2030',\n      mon: [{t:'06:00 · 60 min',badge:'b-swim',h:'Pool · Race-Pace 4km',d:'4000m Continuous @ 1:55/100m'},{t:'18:00 · 60 min',badge:'b-bike',h:'Z2 Recovery Spin',d:'90 min easy spinning'}],\n      tue: [{t:'05:30 · 2h',badge:'b-bike',h:'Trainer · Race-Pace',d:'90 min @ IM-Power (75% FTP)'},{t:'18:00 · 45 min',badge:'b-run',h:'Brick Run',d:'8 km direkt nach Rad @ MP'}],\n      wed: [{t:'06:30 · 90 min',badge:'b-run',h:'Marathon-Pace Run',d:'18 km mit 12 km @ 6:24/km IM-Pace'},{t:'18:00 · 60 min',badge:'b-leg',h:'LEG · Maintenance',d:'Light Squat, Plyometric, Single-Leg'}],\n      thu: [{t:'—',badge:'b-rest',h:'★ TOTAL REST',d:'Massage, Sauna, 10h Schlaf'}],\n      fri: [{t:'06:30 · 75 min',badge:'b-swim',h:'Open Water · Thunersee',d:'3km mit Sighting · Neopren-Drill'}],\n      sat: [{t:'05:30 · 6h',badge:'b-tri',h:'★ LONG DAY',d:'150 km Bike + 12 km Run · monatlich'}],\n      sun: [{t:'08:00 · 2.5h',badge:'b-run',h:'Long Run',d:'30 km · Race-Nutrition-Test'}],\n    }\n  };\n\n  const DAYS = [\n    ['mon','Mo','01'],['tue','Di','02'],['wed','Mi','03'],\n    ['thu','Do','04'],['fri','Fr','05'],['sat','Sa','06'],['sun','So','07']\n  ];\n\n  function renderWeek(phase){\n    const data = PLANS[phase];\n    const grid = document.getElementById('weekgrid');\n    grid.innerHTML = '';\n    DAYS.forEach(([k,name,idx])=>{\n      const slots = data[k] || [];\n      const isRest = k==='thu' || (k==='sun' && slots[0] && slots[0].badge==='b-rest');\n      const day = document.createElement('div');\n      day.className = 'day' + (k==='thu' ? ' rest' : '');\n      let html = `<div class=\"dh\"><div class=\"dn\">${name}<\u002Fdiv><div class=\"di\">${idx}<\u002Fdiv><\u002Fdiv>`;\n      slots.forEach(s=>{\n        html += `<div class=\"slot\">\n          <div class=\"t\">${s.t}<\u002Fdiv>\n          <span class=\"badge ${s.badge}\">${s.h.split(' · ')[0]}<\u002Fspan>\n          <div class=\"h\">${s.h}<\u002Fdiv>\n          <div class=\"d\">${s.d}<\u002Fdiv>\n        <\u002Fdiv>`;\n      });\n      day.innerHTML = html;\n      grid.appendChild(day);\n    });\n  }\n  renderWeek('run');\n\n  document.querySelectorAll('#phasetabs .tab').forEach(btn=>{\n    btn.addEventListener('click', ()=>{\n      document.querySelectorAll('#phasetabs .tab').forEach(b=>b.classList.remove('active'));\n      btn.classList.add('active');\n      renderWeek(btn.dataset.phase);\n    });\n  });\n\n  /* ============== SMOOTH SCROLL ============== */\n  document.querySelectorAll('a[href^=\"#\"]').forEach(a=>{\n    a.addEventListener('click', e=>{\n      const t = document.querySelector(a.getAttribute('href'));\n      if(t){ e.preventDefault(); window.scrollTo({top: t.offsetTop - 60, behavior:'smooth'}); }\n    });\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
